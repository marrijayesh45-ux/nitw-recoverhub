<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search | NITW RecoverHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="weblogo.jpg.jpeg?v=6">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: 'Plus Jakarta Sans', sans-serif; 
    }

    body { 
      background: #F8F9FA; 
      color: #1E1B4B; 
    }

    .header { 
      background: #FFFFFF; 
      padding: 18px 40px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      box-shadow: 0 4px 20px -2px rgba(30, 27, 75, 0.05); 
    }

    .header-brand { 
      color: #1E1B4B; 
      text-decoration: none; 
      font-size: 22px; 
      font-weight: 700; 
    }

    .header-brand span { 
      color: #4338CA; 
    }

    .nav-links { 
      display: flex; 
      gap: 20px; 
    }

    .nav-links a { 
      color: #6B7280; 
      text-decoration: none; 
      font-size: 15px; 
      font-weight: 600; 
      transition: color 0.2s; 
    }

    .nav-links a:hover { 
      color: #4338CA; 
    }

    .container { 
      max-width: 900px; 
      margin: 50px auto; 
      padding: 0 20px; 
    }

    .search-header { 
      text-align: center; 
      margin-bottom: 40px; 
    }

    .search-header h2 { 
      font-size: 36px; 
      color: #1E1B4B; 
      margin-bottom: 12px; 
    }

    .search-header p { 
      color: #6B7280; 
      font-size: 16px; 
    }

    .search-box { 
      background: #FFFFFF; 
      padding: 10px; 
      border-radius: 16px; 
      box-shadow: 0 10px 30px -5px rgba(30, 27, 75, 0.08); 
      display: flex; 
      gap: 10px; 
      margin-bottom: 30px; 
      border: 1px solid rgba(224, 231, 255, 0.8); 
    }

    .search-input { 
      flex: 1; 
      padding: 16px 20px; 
      border: none; 
      background: transparent; 
      font-size: 16px; 
      outline: none; 
      color: #1E1B4B; 
    }

    .btn { 
      padding: 16px 28px; 
      border-radius: 12px; 
      font-weight: 600; 
      font-size: 15px; 
      cursor: pointer; 
      transition: all 0.3s ease; 
      border: none; 
    }

    .btn-lost { 
      background: #FEF3C7; 
      color: #B45309; 
    }

    .btn-lost:hover { 
      background: #FDE68A; 
    }

    .btn-found { 
      background: #4338CA; 
      color: #FFFFFF; 
    }

    .btn-found:hover { 
      background: #3730A3; 
    }

    .status { 
      font-size: 15px; 
      color: #6B7280; 
      margin-bottom: 25px; 
      font-weight: 500; 
    }

    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
      gap: 25px; 
    }

    .card { 
      background: #FFFFFF; 
      border-radius: 16px; 
      overflow: hidden; 
      box-shadow: 0 4px 15px rgba(30, 27, 75, 0.04); 
      transition: transform 0.3s ease; 
      border: 1px solid #F3F4F6; 
    }

    .card:hover { 
      transform: translateY(-5px); 
      box-shadow: 0 12px 25px rgba(30, 27, 75, 0.08); 
    }

    .card img { 
      width: 100%; 
      height: 180px; 
      object-fit: cover; 
      background: #EEF2FF; 
    }

    .card-content { 
      padding: 24px; 
    }

    .card-content h3 { 
      font-size: 18px; 
      color: #1E1B4B; 
      margin-bottom: 12px; 
      font-weight: 700; 
    }

    .card-content p { 
      font-size: 14px; 
      color: #4B5563; 
      margin-bottom: 8px; 
      line-height: 1.5; 
    }

    .card-content strong { 
      color: #111827; 
      font-weight: 600; 
    }

    .badge { 
      display: inline-block; 
      padding: 4px 10px; 
      border-radius: 6px; 
      font-size: 12px; 
      font-weight: 700; 
      margin-bottom: 12px; 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
    }

    .badge-lost { 
      background: #FEE2E2; 
      color: #991B1B; 
    }

    .badge-found { 
      background: #E0E7FF; 
      color: #3730A3; 
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="index.html" class="header-brand">NITW <span>RecoverHub</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="project2.html?type=lost">Report</a>
      <a href="project3.html">Guidelines</a>
    </div>
  </div>

  <div class="container">
    <div class="search-header">
      <h2>Campus Registry</h2>
      <p>Search by keyword, item type, or brand to locate belongings.</p>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" class="search-input" placeholder="e.g., iPhone 13, Library Card, Blue Backpack...">
      <button class="btn btn-lost" onclick="searchLost()">Find Lost</button>
      <button class="btn btn-found" onclick="searchFound()">Find Found</button>
    </div>

    <div id="status" class="status"></div>
    <div id="results" class="grid"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient(
      "https://ibrhzttxagvrerwxmzvt.supabase.co",
      "sb_publishable_Wz0pO6F7GI8ZEhs_J3WrjQ_D8cegRdP"
    );

    async function searchLost() { 
      runSearch("lost_items", "Lost"); 
    }

    async function searchFound() { 
      runSearch("found_items", "Found"); 
    }

    async function runSearch(table, type) {
      const query = document.getElementById("searchInput").value.trim();
      const resultsDiv = document.getElementById("results");
      const status = document.getElementById("status");

      resultsDiv.innerHTML = "";
      status.innerText = "Scanning registry...";

      if (query === "") {
        status.innerText = "Please enter a search term to begin.";
        return;
      }

      const { data } = await supabaseClient
        .from(table)
        .select("*")
        .ilike("name", "%" + query + "%");

      if (!data || data.length === 0) {
        status.innerText = "No matching records found in the database at this time.";
        return;
      }

      status.innerText = `${data.length} item(s) retrieved.`;

      let html = "";
      const badgeClass = type === "Lost" ? "badge-lost" : "badge-found";

      data.forEach(item => {
        const imageUrl = item.image || 'data:image/svg+xml;charset=UTF-8,%3Csvg xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 width%3D%22280%22 height%3D%22180%22 viewBox%3D%220 0 280 180%22%3E%3Crect fill%3D%22%23EEF2FF%22 width%3D%22280%22 height%3D%22180%22%2F%3E%3Ctext fill%3D%22%23A5B4FC%22 font-family%3D%22sans-serif%22 font-size%3D%2214%22 dy%3D%225.25%22 font-weight%3D%22bold%22 x%3D%2250%25%22 y%3D%2250%25%22 text-anchor%3D%22middle%22%3ENo Image Uploaded%3C%2Ftext%3E%3C%2Fsvg%3E';
        html += `
        <div class="card">
          <img src="${imageUrl}" alt="Item Image">
          <div class="card-content">
            <span class="badge ${badgeClass}">${type}</span>
            <h3>${item.name}</h3>
            <p><strong>Location:</strong> ${item.location}</p>
            <p><strong>Date:</strong> ${item.date_lost || item.date_found}</p>
            <p><strong>Details:</strong> ${item.description}</p>
            <p><strong>Contact:</strong> ${item.contact}</p>
          </div>
        </div>
        `;
      });
      
      resultsDiv.innerHTML = html;
    }

    document.getElementById("searchInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        searchLost();
      }
    });
  </script>
</body>
</html>
